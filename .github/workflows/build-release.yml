name: Build & Release (PS1 → EXE)

# Tetikleyici: vX.Y.Z formatinda bir tag push edildiginde otomatik calisir.
# Gelistirme akisi:
#   1. PS1 dosyasini edit et, $global:AppVersion = "1.2.0" guncelle
#   2. git add + commit + push
#   3. git tag v1.2.0
#   4. git push --tags     ← bu workflow'u tetikler
#   5. ~3 dakika sonra GitHub Releases'ta yeni release ve EXE/PS1/SHA256 hazir
#
# NOT: Tum 'shell: pwsh' (PowerShell 7+) kullanilir cunku UTF-8 default'tur.
# 'shell: powershell' (5.1) Turkce/Unicode karakterlerle encoding sorunu yasar.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compile and Release
    runs-on: windows-latest
    permissions:
      contents: write   # Release olusturmak icin gerekli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell environment
        shell: pwsh
        run: |
          Write-Host "PowerShell surumu: $($PSVersionTable.PSVersion)"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12 -bor [Net.SecurityProtocolType]::Tls13

      - name: Install PS2EXE module
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ps2exe -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            "$env:GITHUB_WORKSPACE\TemizlikAsistani.ps1", [ref]$null, [ref]$errors
          )
          if ($errors -and $errors.Count -gt 0) {
            Write-Host "::error::Syntax error: $($errors.Count) hata"
            $errors | ForEach-Object { Write-Host "  L$($_.Extent.StartLineNumber): $($_.Message)" }
            exit 1
          }
          Write-Host "[OK] Syntax clean"

      - name: Verify AppVersion matches tag
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $tagVersion = $tag -replace '^v',''
          $ps1Content = Get-Content "$env:GITHUB_WORKSPACE\TemizlikAsistani.ps1" -Raw -Encoding UTF8
          $verMatch = [regex]::Match($ps1Content, '\$global:AppVersion\s*=\s*"([^"]+)"')
          if (-not $verMatch.Success) {
            Write-Host "::error::PS1 icinde `$global:AppVersion bulunamadi"
            exit 1
          }
          $ps1Version = $verMatch.Groups[1].Value
          if ($tagVersion -ne $ps1Version) {
            Write-Host "::error::Version mismatch! Tag: '$tagVersion'  /  PS1 `$global:AppVersion: '$ps1Version'"
            Write-Host "::error::Auto-update sonsuz dongusu olusur. PS1'de `$global:AppVersion=`"$tagVersion`" yapip yeni tag pushlayin."
            exit 1
          }
          Write-Host "[OK] Version sync: $tagVersion"

      - name: Compile PS1 to EXE
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $version = $tag -replace '^v',''
          Write-Host "Building version: $version"

          # NOT (v1.2.2): -NoConsole flag'i GERI EKLENDI. Sebep:
          # Windows 11 default terminal'i Windows Terminal'e gecti. PS2EXE Console mode'da
          # binary baslatildiginda WindowsTerminal.exe ayri process'te spawn oluyor;
          # ShowWindow SW_HIDE ile bizim PseudoConsoleWindow'u gizliyoruz ama gercek
          # WindowsTerminal pencere ayri proceste, kullanici siyah pencere goruyor.
          # -NoConsole = $true ile PS2EXE GUI mode'da baslar, WindowsTerminal hic invoke olmaz.
          # "False" MessageBox spam sigortasi: PS1 basinda Out-Default + Write-* override.
          $iconArg = if (Test-Path "mrclean.ico") { "mrclean.ico" } else { $null }
          if ($iconArg) {
            Write-Host "Icon file: $iconArg"
          } else {
            Write-Host "No icon file found"
          }

          $ps2exeArgs = @{
            InputFile    = "TemizlikAsistani.ps1"
            OutputFile   = "TemizlikAsistani.exe"
            Title        = "MrClean Sistem Bakim Araci"
            Description  = "Windows icin kapsamli sistem bakim, optimizasyon ve tweak araci"
            Company      = "MrClean"
            Product      = "MrClean"
            Copyright    = "(c) 2026"
            Version      = $version
            RequireAdmin = $true
            Sta          = $true
            NoConsole    = $true
            Verbose      = $true
          }
          if ($iconArg) { $ps2exeArgs.IconFile = $iconArg }

          Invoke-PS2EXE @ps2exeArgs

          if (-not (Test-Path "TemizlikAsistani.exe")) {
            Write-Host "::error::EXE not created"
            exit 1
          }

          $size = (Get-Item "TemizlikAsistani.exe").Length / 1KB
          Write-Host "[OK] EXE ready: $([Math]::Round($size, 1)) KB"

      - name: Calculate SHA256 hashes
        shell: pwsh
        run: |
          $files = @(
            "TemizlikAsistani.exe",
            "TemizlikAsistani.ps1"
          )
          $lines = @()
          foreach ($f in $files) {
            if (Test-Path $f) {
              $hash = (Get-FileHash $f -Algorithm SHA256).Hash
              $lines += "$hash  $f"
              Write-Host "  $f -> $hash"
            }
          }
          $lines -join "`n" | Out-File -FilePath "SHA256SUMS.txt" -Encoding ASCII -NoNewline
          Write-Host "[OK] SHA256SUMS.txt written"
          Get-Content "SHA256SUMS.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            TemizlikAsistani.exe
            TemizlikAsistani.ps1
            SHA256SUMS.txt
            Baslat.cmd
            BeniOku.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
